name: Bump kicad-tools submodule

# Porte 3 du pipeline de validation (voir docs/kicad-tools-fork-strategy.md).
# Tourne chaque mardi (apres le sync-upstream du lundi sur le fork). Compare le
# HEAD de la branche cirqix du fork vs le commit pinné dans cirqix. Si le fork a
# avance -> ouvre une PR bumpant le submodule. Le CI cirqix (build Docker + tests)
# tourne sur la PR ; merge humain = Porte 4.
#
# NB: cette Action ne s'active (cron) que si elle est presente sur la branche par
# defaut (main). Comme elle est ajoutee en meme temps que le submodule (branche
# chore/kicad-tools-submodule), main aura le submodule ET l'Action au meme moment.
#
# NB2 (2026-07-18): depuis que circuit_synth est aussi un sous-module direct
# (commit 9f2fa18), `submodules: true` sur actions/checkout ne doit plus être
# utilisé : son nettoyage récursif visite les gitlinks historiques optionnels
# de Circuit-Synth (voir docs/kicad-tools-fork-strategy.md §Tradeoff) et fait
# échouer le job. Checkout non récursif + init manuel du seul submodule requis
# ici — même pattern que ci.yml et circuit-synth-bump.yml.

on:
  schedule:
    - cron: '27 8 * * 2'   # chaque mardi 08:27 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: kicad-tools-bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      # Deploy key SSH pour cloner le submodule privé bmechergui/kicad-tools
      # (rewrite chirurgical : SEULE l'URL du submodule passe en SSH).
      - name: Configure SSH deploy key (private submodule bmechergui/kicad-tools)
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SUBMODULE_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          git config --global url."git@github.com:bmechergui/kicad-tools.git".insteadOf "https://github.com/bmechergui/kicad-tools.git"

      - uses: actions/checkout@v4
        with:
          # persist-credentials reste a true (defaut) : ce job pousse une
          # branche de bump vers CE repo (cirqix) plus loin dans le job --
          # persist-credentials:false le casserait ("could not read Username",
          # echec verifie en prod le 2026-07-18, run 29642597340). Seul le
          # sous-module kicad-tools est scope hors init automatique ci-dessous.
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout pinned kicad-tools submodule
        run: |
          git submodule sync -- services/kicad/kicad-tools
          git submodule update --init --depth=1 -- services/kicad/kicad-tools

      - name: Compare fork cirqix HEAD vs submodule pinné
        id: cmp
        run: |
          set -euo pipefail
          cd services/kicad/kicad-tools
          # FETCH_HEAD, pas origin/cirqix : le submodule clone en --depth=1
          # ne cree pas toujours la ref de suivi origin/cirqix (echec verifie
          # en prod sur circuit-synth-bump.yml le 2026-07-18, run 29639440081 —
          # meme pattern de checkout, meme risque ici).
          git fetch --quiet origin cirqix
          NEW=$(git rev-parse FETCH_HEAD)
          OLD=$(git rev-parse HEAD)
          { echo "new=$NEW"; echo "old=$OLD"; } >> "$GITHUB_OUTPUT"
          echo "pinned=$OLD  fork_cirqix=$NEW"

      - name: Rien à faire (déjà à jour)
        if: steps.cmp.outputs.new == steps.cmp.outputs.old
        run: echo "Submodule déjà à jour avec la branche cirqix du fork."

      - name: Bump submodule pin + open PR (Porte 3)
        if: steps.cmp.outputs.new != steps.cmp.outputs.old
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW: ${{ steps.cmp.outputs.new }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd services/kicad/kicad-tools
          git checkout "$NEW"
          cd -
          SHORT=$(echo "$NEW" | cut -c1-7)
          BRANCH="auto/bump-kicad-tools-${SHORT}"
          git checkout -b "$BRANCH"
          git add services/kicad/kicad-tools
          git commit -m "chore: bump kicad-tools submodule -> ${SHORT} (Porte 3)"
          git push --force-with-lease origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore: bump kicad-tools submodule -> ${SHORT}" \
            --body "Mise à jour automatique du submodule kicad-tools vers la branche \`cirqix\` du fork (@ ${SHORT}).

          **Porte 3** : le CI (build Docker + tests) doit passer avant merge (**Porte 4**).

          Voir docs/kicad-tools-fork-strategy.md." || echo "PR existe peut-être déjà"

      - name: Remove private submodule credentials
        if: always()
        run: rm -f ~/.ssh/id_ed25519

  # Détection du « silence ambigu » : si le rebase hebdo (Porte 1) échoue sur le
  # fork, sa branche cirqix reste en retard sur upstream/main et AUCUN PR de bump
  # ne s'ouvre — même silence qu'un upstream inactif, et l'issue de conflit vit
  # sur le fork (invisible depuis cirqix). Ce job compare les deux refs par git
  # pur (le fork est PRIVÉ : son API Actions est inaccessible au GITHUB_TOKEN de
  # ce repo — la deploy key SSH suffit en revanche pour un fetch) et ouvre une
  # issue DANS CE REPO si le fork est en retard.
  sync-health:
    # Moindre privilège : ce job ne fait que lister/créer une issue — il
    # n'hérite pas des contents/pull-requests:write du niveau workflow.
    permissions:
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH deploy key (private fork bmechergui/kicad-tools)
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SUBMODULE_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Comparer fork cirqix vs upstream main
        id: lag
        run: |
          set -euo pipefail
          git init --quiet --bare synccheck
          cd synccheck
          # --filter=tree:0 : commits seuls — merge-base n'a besoin ni des
          # arbres ni des blobs (et le clone shallow du job bump fausserait
          # l'ancestry, d'où ce dépôt bare dédié).
          git fetch --quiet --filter=tree:0 git@github.com:bmechergui/kicad-tools.git cirqix
          FORK=$(git rev-parse FETCH_HEAD)
          git fetch --quiet --filter=tree:0 https://github.com/rjwalters/kicad-tools.git main
          UP=$(git rev-parse FETCH_HEAD)
          if git merge-base --is-ancestor "$UP" "$FORK"; then
            echo "behind=false" >> "$GITHUB_OUTPUT"
            echo "Fork cirqix à jour sur upstream/main (${UP})."
          else
            { echo "behind=true"; echo "up=$UP"; echo "fork=$FORK"; } >> "$GITHUB_OUTPUT"
            echo "Fork cirqix EN RETARD sur upstream/main (up=${UP} fork=${FORK})."
          fi

      # NB: gh issue create (GraphQL createIssue) échoue avec "Resource not
      # accessible by integration" même avec issues:write (vérifié sur
      # kicad-tools, cf. sync-upstream.yml du fork) — REST direct.
      - name: Fork en retard -> issue dans cirqix (si absente)
        if: steps.lag.outputs.behind == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: '[sync-upstream] kicad-tools : fork cirqix en retard sur upstream/main'
          # Dédup par marqueur caché dans le body, pas par titre : un titre
          # édité à la main casserait la détection de doublon.
          MARKER: '<!-- sync-health:kicad-tools -->'
          UP: ${{ steps.lag.outputs.up }}
          FORK: ${{ steps.lag.outputs.fork }}
        run: |
          set -euo pipefail
          EXISTS=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/issues?state=open&per_page=100" \
            --jq '.[] | select((.body // "") | contains(env.MARKER)) | .number' | wc -l)
          if [ "$EXISTS" != "0" ]; then
            echo "Issue déjà ouverte — rien à faire."
            exit 0
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/issues" \
            -f title="$TITLE" \
            -f body="${MARKER}
          La branche \`cirqix\` du fork \`bmechergui/kicad-tools\` (@ ${FORK:0:7}) ne contient pas le HEAD d'\`upstream/main\` (\`rjwalters/kicad-tools\` @ ${UP:0:7}).

          Causes possibles :
          - **Conflit de rebase (Porte 2)** — le sync-upstream de lundi a échoué : voir les issues du fork, résoudre à la main (\`--skip\` si patch redondant), tester, force-push \`cirqix\`. Procédure : services/kicad/DEPENDENCIES.md.
          - **Commits upstream depuis le dernier sync** — bruit bénin, se résorbe au prochain sync (lundi). Fermer cette issue si c'est le cas.

          Tant que le fork est en retard, la Porte 3 n'ouvre aucun PR de bump : ce silence est indistinguable d'un upstream inactif — d'où cette issue."

      - name: Remove private fork credentials
        if: always()
        run: rm -f ~/.ssh/id_ed25519
