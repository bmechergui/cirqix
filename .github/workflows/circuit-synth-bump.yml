name: Bump circuit_synth submodule

# Porte 3 du pipeline de validation (meme modele que kicad-tools-bump.yml, voir
# services/kicad/DEPENDENCIES.md et docs/kicad-tools-fork-strategy.md).
# Tourne chaque mardi (apres le sync-upstream du lundi sur le fork public
# bmechergui/circuit-synth). Compare le HEAD de la branche cirqix du fork vs le
# commit pinne dans ce repo. Si le fork a avance -> ouvre une PR bumpant le
# submodule. Le CI cirqix (build Docker + tests) tourne sur la PR ; merge
# humain = Porte 4.
#
# NB: contrairement a kicad-tools (prive, deploy key SSH requise), le fork
# circuit_synth est PUBLIC -> le GITHUB_TOKEN par defaut suffit pour le fetch.

on:
  schedule:
    - cron: '43 8 * * 2'   # chaque mardi 08:43 UTC (apres kicad-tools-bump a 08:27)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: circuit-synth-bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # actions/checkout ne peut pas scoper submodules:true a un seul
          # sous-module : il initialiserait aussi le kicad-tools PRIVE sans
          # credentials -> echec. Meme pattern que ci.yml : checkout non
          # recursif, puis init manuel du seul submodule qui nous concerne.
          # persist-credentials reste a true (defaut) : ce job pousse une
          # branche de bump vers CE repo (cirqix) plus loin dans le job --
          # persist-credentials:false le casserait (meme bug trouve sur
          # kicad-tools-bump.yml, run 29642597340, "could not read Username").
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout pinned circuit_synth submodule
        run: |
          git submodule sync -- services/kicad/circuit_synth
          git submodule update --init --depth=1 -- services/kicad/circuit_synth

      - name: Comparer fork cirqix HEAD vs submodule pinne
        id: cmp
        run: |
          set -euo pipefail
          cd services/kicad/circuit_synth
          # FETCH_HEAD, pas origin/cirqix : le submodule clone en --depth=1
          # ne cree pas toujours la ref de suivi origin/cirqix (echec verifie
          # en prod le 2026-07-18, run 29639440081).
          git fetch --quiet origin cirqix
          NEW=$(git rev-parse FETCH_HEAD)
          OLD=$(git rev-parse HEAD)
          { echo "new=$NEW"; echo "old=$OLD"; } >> "$GITHUB_OUTPUT"
          echo "pinne=$OLD  fork_cirqix=$NEW"

      - name: Rien a faire (deja a jour)
        if: steps.cmp.outputs.new == steps.cmp.outputs.old
        run: echo "Submodule deja a jour avec la branche cirqix du fork."

      - name: Bump submodule pin + open PR (Porte 3)
        if: steps.cmp.outputs.new != steps.cmp.outputs.old
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW: ${{ steps.cmp.outputs.new }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd services/kicad/circuit_synth
          git checkout "$NEW"
          cd -
          SHORT=$(echo "$NEW" | cut -c1-7)
          BRANCH="auto/bump-circuit-synth-${SHORT}"
          git checkout -b "$BRANCH"
          git add services/kicad/circuit_synth
          git commit -m "chore: bump circuit_synth submodule -> ${SHORT} (Porte 3)"
          git push --force-with-lease origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore: bump circuit_synth submodule -> ${SHORT}" \
            --body "Mise a jour automatique du submodule circuit_synth vers la branche \`cirqix\` du fork public (@ ${SHORT}).

          **Porte 3** : le CI (build Docker + tests) doit passer avant merge (**Porte 4**).

          Voir services/kicad/DEPENDENCIES.md." || echo "PR existe peut-etre deja"

  # Detection du "silence ambigu" : si le rebase hebdo (Porte 1) echoue sur le
  # fork, sa branche cirqix reste en retard sur upstream/main et AUCUN PR de
  # bump ne s'ouvre — meme silence qu'un upstream inactif, et l'issue de conflit
  # vit sur le fork (invisible depuis cirqix). Ce job compare les deux refs par
  # git pur (fork public -> aucun credential requis) et ouvre une issue DANS CE
  # REPO si le fork est en retard. Meme modele que kicad-tools-bump.yml.
  sync-health:
    # Moindre privilege : ce job ne fait que lister/creer une issue — il
    # n'herite pas des contents/pull-requests:write du niveau workflow.
    permissions:
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Comparer fork cirqix vs upstream main
        id: lag
        run: |
          set -euo pipefail
          git init --quiet --bare synccheck
          cd synccheck
          # --filter=tree:0 : commits seuls — merge-base n'a besoin ni des
          # arbres ni des blobs (et le clone shallow du job bump fausserait
          # l'ancestry, d'ou ce depot bare dedie).
          git fetch --quiet --filter=tree:0 https://github.com/bmechergui/circuit-synth.git cirqix
          FORK=$(git rev-parse FETCH_HEAD)
          git fetch --quiet --filter=tree:0 https://github.com/circuit-synth/circuit-synth.git main
          UP=$(git rev-parse FETCH_HEAD)
          if git merge-base --is-ancestor "$UP" "$FORK"; then
            echo "behind=false" >> "$GITHUB_OUTPUT"
            echo "Fork cirqix a jour sur upstream/main (${UP})."
          else
            { echo "behind=true"; echo "up=$UP"; echo "fork=$FORK"; } >> "$GITHUB_OUTPUT"
            echo "Fork cirqix EN RETARD sur upstream/main (up=${UP} fork=${FORK})."
          fi

      # NB: gh issue create (GraphQL createIssue) echoue avec "Resource not
      # accessible by integration" meme avec issues:write (verifie sur
      # kicad-tools, cf. sync-upstream.yml du fork) — REST direct.
      - name: Fork en retard -> issue dans cirqix (si absente)
        if: steps.lag.outputs.behind == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: '[sync-upstream] circuit_synth : fork cirqix en retard sur upstream/main'
          # Dedup par marqueur cache dans le body, pas par titre : un titre
          # edite a la main casserait la detection de doublon.
          MARKER: '<!-- sync-health:circuit-synth -->'
          UP: ${{ steps.lag.outputs.up }}
          FORK: ${{ steps.lag.outputs.fork }}
        run: |
          set -euo pipefail
          EXISTS=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/issues?state=open&per_page=100" \
            --jq '.[] | select((.body // "") | contains(env.MARKER)) | .number' | wc -l)
          if [ "$EXISTS" != "0" ]; then
            echo "Issue deja ouverte — rien a faire."
            exit 0
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/issues" \
            -f title="$TITLE" \
            -f body="${MARKER}
          La branche \`cirqix\` du fork \`bmechergui/circuit-synth\` (@ ${FORK:0:7}) ne contient pas le HEAD d'\`upstream/main\` (\`circuit-synth/circuit-synth\` @ ${UP:0:7}).

          Causes possibles :
          - **Conflit de rebase (Porte 2)** — le sync-upstream de lundi a echoue : voir les issues du fork, resoudre a la main (\`--skip\` si patch redondant), tester, force-push \`cirqix\`. Procedure : services/kicad/DEPENDENCIES.md.
          - **Commits upstream depuis le dernier sync** — bruit benin, se resorbe au prochain sync (lundi). Fermer cette issue si c'est le cas.

          Tant que le fork est en retard, la Porte 3 n'ouvre aucun PR de bump : ce silence est indistinguable d'un upstream inactif — d'ou cette issue."
