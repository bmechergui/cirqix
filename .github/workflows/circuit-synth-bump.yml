name: Bump circuit_synth submodule

# Porte 3 du pipeline de validation (meme modele que kicad-tools-bump.yml, voir
# services/kicad/DEPENDENCIES.md et docs/kicad-tools-fork-strategy.md).
# Tourne chaque mardi (apres le sync-upstream du lundi sur le fork public
# bmechergui/circuit-synth). Compare le HEAD de la branche cirqix du fork vs le
# commit pinne dans ce repo. Si le fork a avance -> ouvre une PR bumpant le
# submodule. Le CI cirqix (build Docker + tests) tourne sur la PR ; merge
# humain = Porte 4.
#
# NB: contrairement a kicad-tools (prive, deploy key SSH requise), le fork
# circuit_synth est PUBLIC -> le GITHUB_TOKEN par defaut suffit pour le fetch.

on:
  schedule:
    - cron: '43 8 * * 2'   # chaque mardi 08:43 UTC (apres kicad-tools-bump a 08:27)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: circuit-synth-bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # actions/checkout ne peut pas scoper submodules:true a un seul
          # sous-module : il initialiserait aussi le kicad-tools PRIVE sans
          # credentials -> echec. Meme pattern que ci.yml : checkout non
          # recursif, puis init manuel du seul submodule qui nous concerne.
          submodules: false
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout pinned circuit_synth submodule
        run: |
          git submodule sync -- services/kicad/circuit_synth
          git submodule update --init --depth=1 -- services/kicad/circuit_synth

      - name: Comparer fork cirqix HEAD vs submodule pinne
        id: cmp
        run: |
          set -euo pipefail
          cd services/kicad/circuit_synth
          git fetch --quiet origin cirqix
          NEW=$(git rev-parse origin/cirqix)
          OLD=$(git rev-parse HEAD)
          { echo "new=$NEW"; echo "old=$OLD"; } >> "$GITHUB_OUTPUT"
          echo "pinne=$OLD  fork_cirqix=$NEW"

      - name: Rien a faire (deja a jour)
        if: steps.cmp.outputs.new == steps.cmp.outputs.old
        run: echo "Submodule deja a jour avec la branche cirqix du fork."

      - name: Bump submodule pin + open PR (Porte 3)
        if: steps.cmp.outputs.new != steps.cmp.outputs.old
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW: ${{ steps.cmp.outputs.new }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd services/kicad/circuit_synth
          git checkout "$NEW"
          cd -
          SHORT=$(echo "$NEW" | cut -c1-7)
          BRANCH="auto/bump-circuit-synth-${SHORT}"
          git checkout -b "$BRANCH"
          git add services/kicad/circuit_synth
          git commit -m "chore: bump circuit_synth submodule -> ${SHORT} (Porte 3)"
          git push --force-with-lease origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore: bump circuit_synth submodule -> ${SHORT}" \
            --body "Mise a jour automatique du submodule circuit_synth vers la branche \`cirqix\` du fork public (@ ${SHORT}).

          **Porte 3** : le CI (build Docker + tests) doit passer avant merge (**Porte 4**).

          Voir services/kicad/DEPENDENCIES.md." || echo "PR existe peut-etre deja"
