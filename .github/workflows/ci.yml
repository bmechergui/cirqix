name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from packageManager field in package.json — do not set version here
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo test

  kicad-docker:
    name: KiCad Docker Build
    runs-on: ubuntu-latest
    steps:
      # Deploy key SSH pour cloner le submodule privé bmechergui/kicad-tools
      # (rewrite chirurgical : SEULE l'URL du submodule passe en SSH, le checkout
      # principal cirqix reste inchangé).
      - name: Configure SSH deploy key (private submodule bmechergui/kicad-tools)
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SUBMODULE_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          git config --global url."git@github.com:bmechergui/kicad-tools.git".insteadOf "https://github.com/bmechergui/kicad-tools.git"

      - uses: actions/checkout@v4
        with:
          # actions/checkout recursively walks initialized repositories while
          # persisting credentials. Circuit-Synth has optional historical
          # gitlinks, so initialize only Cirqix's two direct submodules below.
          submodules: false
          persist-credentials: false

      - name: Checkout pinned direct KiCad submodules
        run: |
          git submodule sync -- services/kicad/kicad-tools services/kicad/circuit_synth
          git submodule update --init --depth=1 -- services/kicad/kicad-tools services/kicad/circuit_synth

      - name: Remove private submodule credentials
        if: always()
        run: |
          rm -f ~/.ssh/id_ed25519
          git config --global --unset-all url."git@github.com:bmechergui/kicad-tools.git".insteadOf || true

      - name: Verify pinned KiCad build sources
        run: python3 -m unittest services.kicad.tests.test_docker_build_context -v

      - name: Build KiCad Docker image
        run: docker build -t cirqix-kicad:test ./services/kicad

      - name: Test KiCad service security boundary
        run: >-
          docker run --rm --entrypoint python3 cirqix-kicad:test
          -m unittest tests.test_service_security -v

      - name: Test Circuit-Synth regression patches
        run: >-
          docker run --rm --entrypoint python3 cirqix-kicad:test
          -m unittest discover -s /app/circuit_synth/tests/unit
          -p 'test_cirqix_*.py' -v

      - name: Test /health endpoint
        run: |
          set -euo pipefail
          docker run -d --name kicad-test cirqix-kicad:test
          trap 'docker rm -f kicad-test >/dev/null 2>&1 || true' EXIT

          for attempt in $(seq 1 36); do
            state=$(docker inspect --format '{{.State.Status}} {{.State.Health.Status}}' kicad-test)
            case "$state" in
              "running healthy") exit 0 ;;
              *" unhealthy"|"exited "*)
                docker logs kicad-test
                exit 1
                ;;
            esac
            sleep 5
          done

          echo "KiCad service did not become healthy within 180 seconds"
          docker logs kicad-test
          exit 1
