name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from packageManager field in package.json — do not set version here
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo test

  kicad-docker:
    name: KiCad Docker Build
    runs-on: ubuntu-latest
    # Non-blocking: KiCad base image availability depends on external registry
    continue-on-error: true
    steps:
      # Deploy key SSH pour cloner le submodule privé bmechergui/kicad-tools
      # (rewrite chirurgical : SEULE l'URL du submodule passe en SSH, le checkout
      # principal cirqix reste inchangé).
      - name: Configure SSH deploy key (private submodule bmechergui/kicad-tools)
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SUBMODULE_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          git config --global url."git@github.com:bmechergui/kicad-tools.git".insteadOf "https://github.com/bmechergui/kicad-tools.git"

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build KiCad Docker image
        run: docker build -t cirqix-kicad:test ./services/kicad

      - name: Test /health endpoint
        run: |
          docker run -d --name kicad-test -p 8766:8766 cirqix-kicad:test
          sleep 10
          curl -f http://localhost:8766/health
          docker stop kicad-test
