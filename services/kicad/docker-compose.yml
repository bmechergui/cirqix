services:
  kicad:
    build:
      context: .
      dockerfile: Dockerfile
      # circuit_synth/ + kicad-tools/ sont copiés dans l'image (fallback prod sans mount).
      # En dev, seuls les fichiers FastAPI ci-dessous restent visibles en direct.
    image: cirqix-kicad:latest
    container_name: cirqix-kicad
    ports:
      - '127.0.0.1:8766:8766'
    volumes:
      - kicad-jobs:/tmp/kicad-jobs
      # Code du service FastAPI éditable live (reasoner, routers…). Restart du conteneur
      # pour prise en compte (uvicorn --workers, pas de --reload pour rester thread-safe).
      - ./tools:/app/tools:ro
      - ./routers:/app/routers:ro
      - ./main.py:/app/main.py:ro
      - ./security.py:/app/security.py:ro
    environment:
      - PYTHONUNBUFFERED=1
      - KICAD_SYMBOL_DIR=/usr/share/kicad/symbols
      - KICAD_FOOTPRINT_DIR=/usr/share/kicad/footprints
      - FREEROUTING_API_URL=http://127.0.0.1:37864
      # Obligatoire pour toutes les routes sauf /health. `:?` empêche un
      # démarrage local accidentel avec une API privilégiée non protégée.
      - KICAD_SERVICE_TOKEN=${KICAD_SERVICE_TOKEN:?KICAD_SERVICE_TOKEN must be set}
      # Reasoner IA (call_agent_reason → PCBReasoningAgent + Claude Haiku). Sans cette
      # clé, le service retombe sur `kct reason --auto-route` (heuristique sans LLM).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8766/health']
      interval: 30s
      timeout: 10s
      retries: 3
      # Xvfb, Freerouting and KiCad can take time to initialize.
      start_period: 180s

volumes:
  kicad-jobs:
